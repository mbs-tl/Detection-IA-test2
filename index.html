<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Étude de Perception - Test 2 (Influence IA)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-zinc-50 text-zinc-900 min-h-screen flex items-center justify-center p-4" x-data="testApp()">

    <!-- CHARGEMENT / ERREUR -->
    <template x-if="screen === 'loading'">
        <div class="text-center">
            <div class="animate-spin h-12 w-12 border-4 border-indigo-600 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="text-zinc-600 font-medium" x-text="loadingStatus">Chargement des ressources...</p>
        </div>
    </template>

    <template x-if="screen === 'error'">
        <div class="text-center p-8 bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden max-w-md">
            <i data-lucide="alert-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
            <p class="text-zinc-800 font-medium" x-text="errorMessage"></p>
            <button @click="window.location.reload()" class="mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 px-8">Réessayer</button>
        </div>
    </template>

    <!-- INTRODUCTION -->
    <template x-if="screen === 'intro'">
        <div class="w-full max-w-6xl bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/2 p-8 md:p-12 bg-indigo-600 text-white flex flex-col justify-center">
                <div class="flex items-center gap-3 mb-8">
                    <i data-lucide="brain-circuit" class="w-10 h-10"></i>
                    <h1 class="text-3xl font-bold">Étude de Perception - Test 2</h1>
                </div>
                <div class="space-y-6 text-indigo-100">
                    <div class="bg-indigo-700/50 p-6 rounded-2xl border border-indigo-400/30">
                        <h2 class="text-white font-bold mb-3 flex items-center gap-2"><i data-lucide="info" class="w-5 h-5"></i> Votre tâche</h2>
                        <p class="text-sm leading-relaxed">
                            Dans cette version, vous recevrez un avis d'un modèle d'IA après votre premier jugement. Vous pourrez alors décider de maintenir ou de changer votre avis.<br /><br />
                            Faites de votre mieux. Nous étudions l'influence des outils d'IA sur la perception humaine.
                        </p>
                    </div>
                    <div class="space-y-4">
                        <h2 class="text-white font-bold flex items-center gap-2"><i data-lucide="clipboard-check" class="w-5 h-5"></i> Consignes</h2>
                        <ul class="text-sm space-y-3">
                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">1</span> <span>Observez l'image (30s).</span></li>
                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">2</span> <span>Donnez votre premier avis (Réelle ou IA).</span></li>
                            <li class="flex items-start gap-3"><span class="bg-white/20 px-2 rounded">3</span> <span>Consultez l'avis de l'IA et confirmez ou changez votre choix.</span></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="md:w-1/2 p-8 md:p-12 overflow-y-auto max-h-[90vh]">
                <h2 class="text-2xl font-bold mb-6">Questionnaire initial</h2>
                <div class="space-y-6">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block">E-mail</label>
                            <input type="email" x-model="userData.email" class="w-full px-3 py-2 rounded-xl border border-zinc-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white transition-all" placeholder="votre@email.com">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block">Âge</label>
                            <input type="number" x-model="userData.age" class="w-full px-3 py-2 rounded-xl border border-zinc-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white transition-all" placeholder="Ex: 25">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block">Sexe</label>
                            <select x-model="userData.sex" class="w-full px-3 py-2 rounded-xl border border-zinc-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white transition-all">
                                <option value="Homme">Homme</option>
                                <option value="Femme">Femme</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block">Expertise</label>
                            <input type="text" x-model="userData.expertise" class="w-full px-3 py-2 rounded-xl border border-zinc-200 text-sm outline-none focus:ring-2 focus:ring-indigo-500 bg-white transition-all" placeholder="Ex: Data">
                        </div>
                    </div>

                    <hr class="border-zinc-100">
                    <p class="text-sm font-bold text-indigo-600">Au cours des dernières 24 heures...</p>

                    <div class="space-y-4">
                        <div>
                            <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-3 block leading-relaxed">
                                AURIEZ-VOUS ÉTÉ SUJET À L’UNE DE CES SITUATIONS AU COURS DES DERNIÈRES 24H : MANQUE DE SOMMEIL, CONSOMMATION DE SUBSTANCES, DÉPRESSION, ..... ?
                            </label>
                            <div class="grid grid-cols-3 gap-4">
                                <button @click="userData.recentIssues = 'oui'" :class="userData.recentIssues === 'oui' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-3 rounded-xl text-sm font-bold border-2 transition-all">Oui</button>
                                <button @click="userData.recentIssues = 'non'" :class="userData.recentIssues === 'non' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-3 rounded-xl text-sm font-bold border-2 transition-all">Non</button>
                                <button @click="userData.recentIssues = 'prefere_pas'" :class="userData.recentIssues === 'prefere_pas' ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-3 rounded-xl text-sm font-bold border-2 transition-all">Ne pas répondre</button>
                            </div>
                        </div>
                    </div>

                    <button @click="startTest()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95">
                        Valider et Commencer <i data-lucide="play" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- DEMO -->
    <template x-if="screen === 'demo'">
        <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden p-8 md:p-12">
            <div class="text-center mb-10">
                <h2 class="text-3xl font-bold text-indigo-600 mb-2">Démonstration Test 2</h2>
                <p class="text-zinc-500">Voici comment se déroule cette nouvelle version.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
                <div class="space-y-8">
                    <div :class="demoStep === 1 ? 'opacity-100 scale-105' : 'opacity-40 scale-95'" class="flex items-start gap-4 transition-all duration-500">
                        <div class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0">1</div>
                        <div>
                            <h3 class="font-bold text-lg">Phase d'Observation</h3>
                            <p class="text-sm text-zinc-600">Analysez attentivement l'image pendant 30s. Cherchez des indices. Cliquez sur "Répondre" pour la masquer.</p>
                        </div>
                    </div>
                    <div :class="demoStep === 2 ? 'opacity-100 scale-105' : 'opacity-40 scale-95'" class="flex items-start gap-4 transition-all duration-500">
                        <div class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0">2</div>
                        <div>
                            <h3 class="font-bold text-lg">Premier Avis</h3>
                            <p class="text-sm text-zinc-600">Donnez votre premier jugement (Réelle ou IA) et votre niveau de confiance.</p>
                        </div>
                    </div>
                    <div :class="demoStep === 3 ? 'opacity-100 scale-105' : 'opacity-40 scale-95'" class="flex items-start gap-4 transition-all duration-500">
                        <div class="bg-indigo-600 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0">3</div>
                        <div>
                            <h3 class="font-bold text-lg">Avis de l'IA</h3>
                            <p class="text-sm text-zinc-600">Découvrez la prédiction de l'IA. Vous devrez alors décider si vous changez d'avis ou si vous maintenez votre choix initial.</p>
                        </div>
                    </div>
                </div>

                <div class="bg-zinc-50 rounded-3xl p-6 border-2 border-dashed border-zinc-200 relative">
                    <template x-if="demoStep === 1">
                        <div class="space-y-4">
                            <div class="aspect-video bg-zinc-200 rounded-xl overflow-hidden relative"><img src="https://picsum.photos/seed/demo2/800/450" class="w-full h-full object-cover"></div>
                            <button @click="demoStep = 2" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg">Répondre</button>
                        </div>
                    </template>
                    <template x-if="demoStep === 2">
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <button class="p-3 border-2 border-zinc-100 bg-white rounded-xl text-center text-xs font-bold text-zinc-400">Réelle</button>
                                <button class="p-3 border-2 border-amber-500 bg-amber-50 rounded-xl text-center text-xs font-bold text-amber-700">IA</button>
                            </div>
                            
                            <div class="p-3 bg-white border border-zinc-100 rounded-xl">
                                <p class="text-[10px] font-bold text-zinc-400 uppercase mb-2">Pourquoi ? (Si IA)</p>
                                <div class="flex flex-wrap gap-1">
                                    <span class="px-2 py-1 bg-indigo-600 text-white text-[8px] rounded-md font-bold">Éclairage</span>
                                    <span class="px-2 py-1 bg-zinc-100 text-zinc-400 text-[8px] rounded-md font-bold">Anatomie</span>
                                    <span class="px-2 py-1 bg-zinc-100 text-zinc-400 text-[8px] rounded-md font-bold">Textures</span>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <div class="flex justify-between text-[10px] font-bold">
                                    <span class="text-zinc-400 uppercase">Confiance</span>
                                    <span class="text-indigo-600">85%</span>
                                </div>
                                <div class="w-full h-1.5 bg-zinc-100 rounded-full overflow-hidden">
                                    <div class="w-[85%] h-full bg-indigo-600"></div>
                                </div>
                            </div>

                            <button @click="demoStep = 3" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg">Suivant</button>
                        </div>
                    </template>
                    <template x-if="demoStep === 3">
                        <div class="space-y-6">
                            <div class="bg-indigo-50 p-4 rounded-2xl border-2 border-indigo-100 text-center">
                                <p class="text-[10px] text-indigo-700 font-bold mb-1">L'IA a prédit :</p>
                                <p class="text-lg font-black text-indigo-600 uppercase">IA</p>
                            </div>
                            <p class="text-xs font-bold text-center">Voulez-vous changer d'avis ?</p>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="p-3 bg-white border-2 border-zinc-200 text-xs font-bold rounded-xl">Oui</button>
                                <button class="p-3 bg-indigo-600 text-white text-xs font-bold rounded-xl">Non</button>
                            </div>
                            <button @click="startRealTest()" class="w-full bg-zinc-900 text-white font-bold py-4 rounded-xl shadow-xl active:scale-95 transition-transform">C'est parti !</button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </template>

    <!-- TEST -->
    <template x-if="screen === 'test'">
        <div class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="relative">
                <div class="absolute top-4 right-4 z-10 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4 text-zinc-600"></i>
                    <span class="font-mono font-bold" x-text="timeLeft + 's'"></span>
                </div>
                <div class="aspect-[4/3] rounded-3xl overflow-hidden bg-zinc-200 shadow-2xl border-4 border-white flex items-center justify-center">
                    <template x-if="!isResponding">
                        <img :src="currentImage.url" class="w-full h-full object-cover">
                    </template>
                    <template x-if="isResponding">
                        <div class="w-full h-full bg-zinc-100 flex flex-col items-center justify-center text-zinc-400 p-8 text-center">
                            <i data-lucide="eye-off" class="w-12 h-12 mb-4"></i>
                            <p class="font-bold uppercase tracking-widest text-xs">Image Masquée</p>
                            <p class="text-[10px] mt-2 leading-relaxed">L'image est masquée pour garantir que votre réponse repose sur votre première impression.</p>
                        </div>
                    </template>
                </div>
                <div class="mt-4 flex justify-between items-center px-2">
                    <span class="text-sm font-medium text-zinc-400" x-text="'Image ' + (currentIdx + 1) + ' / ' + images.length"></span>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden p-8 flex flex-col min-h-[500px]">
                <!-- PHASE 1: REPONDRE -->
                <template x-if="!isResponding">
                    <div class="flex-1 flex flex-col justify-center items-center text-center space-y-6">
                        <h3 class="text-2xl font-bold">Analysez l'image</h3>
                        <p class="text-zinc-500">Cliquez sur le bouton dès que vous êtes prêt à donner votre avis.</p>
                        <button @click="handleRespondClick()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-6 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 text-xl">Répondre</button>
                    </div>
                </template>

                <!-- PHASE 2: CONNAISSANCE DE L'IMAGE -->
                <template x-if="isResponding && isCheckingKnowledge">
                    <div class="flex-1 flex flex-col justify-center items-center text-center space-y-8">
                        <div class="bg-indigo-50 p-6 rounded-3xl border-2 border-indigo-100 w-full">
                            <h3 class="text-xl font-bold text-indigo-900 mb-4">Connaissez-vous déjà cette image ?</h3>
                            <p class="text-sm text-indigo-700 leading-relaxed">Si vous l'avez déjà vue auparavant, nous la remplacerons pour garantir l'impartialité du test.</p>
                        </div>
                        <div class="grid grid-cols-2 gap-4 w-full">
                            <button @click="handleKnowledgeResponse(true)" class="bg-white border-2 border-zinc-200 hover:border-indigo-600 hover:text-indigo-600 py-4 rounded-2xl font-bold transition-all active:scale-95">Oui, je la connais</button>
                            <button @click="handleKnowledgeResponse(false)" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition-all active:scale-95">Non, jamais vue</button>
                        </div>
                    </div>
                </template>

                <!-- PHASE 3: PREDICTION INITIALE -->
                <template x-if="isResponding && !isCheckingKnowledge && !isShowingAIAdvice">
                    <div class="flex-1 flex flex-col">
                        <h2 class="text-xl font-bold mb-6">Réelle ou IA ?</h2>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <button @click="prediction = 'Réelle'" :class="prediction === 'Réelle' ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-4 rounded-2xl font-bold border-2 transition-all">Réelle</button>
                            <button @click="prediction = 'IA'" :class="prediction === 'IA' ? 'bg-amber-50 border-amber-500 text-amber-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-4 rounded-2xl font-bold border-2 transition-all">IA</button>
                        </div>

                        <template x-if="prediction === 'IA'">
                            <div class="mb-8">
                                <p class="text-sm font-bold mb-3 text-zinc-500 uppercase">Pourquoi ?</p>
                                <div class="flex flex-wrap gap-2">
                                    <template x-for="r in reasons" :key="r.id">
                                        <button @click="toggleReason(r.label)" :class="selectedReasons.includes(r.label) ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-zinc-50 text-zinc-600 border-zinc-200'" class="px-3 py-2 rounded-xl text-xs font-medium border transition-colors" x-text="r.label"></button>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <div class="space-y-4 mb-8">
                            <div class="flex justify-between items-center text-sm font-bold">
                                <label class="text-zinc-500 uppercase">Confiance</label>
                                <span class="text-indigo-600" x-text="confidence + '%'"></span>
                            </div>
                            <input type="range" min="50" max="100" x-model="confidence" class="w-full h-2 bg-zinc-100 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <button @click="showAIAdvicePhase()" class="mt-auto bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95">Suivant</button>
                    </div>
                </template>

                <!-- PHASE 3: AVIS IA ET CHANGEMENT -->
                <template x-if="isShowingAIAdvice">
                    <div class="flex-1 flex flex-col justify-center">
                        <div class="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-100 mb-8 text-center">
                            <p class="text-sm text-indigo-900 mb-2">Le modèle IA a prédit que c'est une image :</p>
                            <p class="text-2xl font-black text-indigo-600 uppercase" x-text="currentImage.aiAdvice"></p>
                        </div>

                        <h3 class="text-lg font-bold text-center mb-6">Voulez-vous changer d'avis ?</h3>
                        
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <button @click="changeMind = 'oui'" :class="changeMind === 'oui' ? 'bg-indigo-600 text-white' : 'bg-white border-zinc-200'" class="py-4 rounded-2xl font-bold border-2 transition-all">Oui, je change</button>
                            <button @click="changeMind = 'non'" :class="changeMind === 'non' ? 'bg-indigo-600 text-white' : 'bg-white border-zinc-200'" class="py-4 rounded-2xl font-bold border-2 transition-all">Non, je garde</button>
                        </div>

                        <button @click="nextImage()" class="bg-zinc-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-transform">Confirmer et Continuer</button>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <!-- SURVEY -->
    <template x-if="screen === 'survey'">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden p-8">
            <h2 class="text-2xl font-bold mb-8 text-center">Quelques questions finales</h2>
            <div class="space-y-8">
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block block mb-4">Avez-vous trouvé ce test :</label>
                    <div class="grid grid-cols-3 gap-2">
                        <template x-for="opt in ['Facile', 'Moyenne', 'Difficile']">
                            <button @click="surveyData.difficulty = opt" :class="surveyData.difficulty === opt ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-3 rounded-xl text-sm font-bold border-2 transition-all" x-text="opt"></button>
                        </template>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-1 block block mb-4">Avez-vous eu suffisamment de temps ?</label>
                    <div class="grid grid-cols-2 gap-2">
                        <template x-for="opt in ['Oui', 'Non']">
                            <button @click="surveyData.enoughTime = opt" :class="surveyData.enoughTime === opt ? 'bg-indigo-50 border-indigo-500 text-indigo-700' : 'bg-white border-zinc-100 text-zinc-400'" class="py-3 rounded-xl text-sm font-bold border-2 transition-all" x-text="opt"></button>
                        </template>
                    </div>
                </div>
                <button @click="finishTest()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2 active:scale-95 mt-4">Terminer l'étude</button>
            </div>
        </div>
    </template>

    <!-- FINISH -->
    <template x-if="screen === 'finish'">
        <div class="w-full max-w-md bg-white rounded-3xl shadow-xl border border-zinc-100 overflow-hidden p-12 text-center">
            <i data-lucide="check-circle-2" class="w-16 h-16 text-emerald-500 mx-auto mb-6"></i>
            <h2 class="text-3xl font-bold mb-4">Terminé !</h2>
            <p class="text-zinc-500 mb-8">Merci pour votre précieuse contribution à cette étude scientifique.</p>
            <button @click="window.location.reload()" class="w-full bg-white border-2 border-zinc-100 hover:border-zinc-200 text-zinc-600 font-bold py-4 rounded-2xl transition-all active:scale-95">Recommencer</button>
        </div>
    </template>

    <script>
        function testApp() {
            return {
                screen: 'loading',
                loadingStatus: 'Initialisation...',
                errorMessage: '',
                REPO_PATH: "mbs-tl/Detection-IA-test2",
                SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxmH-dnqHSGo9IegIZxM2YqQ6R-mCy66qaoolVV1IN-pXaAYTc11IiWk5xRoy5_eX-5/exec",
                
                userData: { email: '', age: '', sex: 'Homme', expertise: '', recentIssues: 'non' },
                surveyData: { difficulty: 'Moyenne', enoughTime: 'Oui' },
                
                images: [],
                replacementReal: [],
                replacementIA: [],
                currentIdx: 0,
                timeLeft: 30,
                timer: null,
                isResponding: false,
                isCheckingKnowledge: false,
                isShowingAIAdvice: false,
                prediction: null,
                changeMind: null,
                selectedReasons: [],
                confidence: 75,
                startTime: null,
                responseTime: null,
                demoStep: 0,
                
                reasons: [
                    { id: 'lighting', label: 'Éclairage' }, { id: 'background', label: 'Arrière-plan' },
                    { id: 'anatomy', label: 'Anatomie' }, { id: 'objects', label: 'Objets' },
                    { id: 'cohesiveness', label: 'Cohérence' }, { id: 'textures', label: 'Textures' },
                    { id: 'other', label: 'Autre' }
                ],

                init() {
                    this.fetchImages();
                },

                async fetchImages() {
                    try {
                        this.loadingStatus = "Récupération de la liste des images...";
                        const fetchFolder = async (path, type) => {
                            const res = await fetch(`https://api.github.com/repos/${this.REPO_PATH}/contents/${path}`);
                            if (!res.ok) throw new Error(`Dossier ${path} non trouvé`);
                            const files = await res.json();
                            const imageFiles = files.filter(f => /\.(jpe?g|png|webp)$/i.test(f.name));
                            const textFiles = files.filter(f => /\.txt$/i.test(f.name));
                            
                            return Promise.all(imageFiles.map(async img => {
                                const baseName = img.name.split('.').slice(0, -1).join('.');
                                const txtFile = textFiles.find(t => t.name.startsWith(baseName));
                                let aiAdvice = "Indisponible";
                                if (txtFile) {
                                    try {
                                        const tRes = await fetch(txtFile.download_url);
                                        aiAdvice = await tRes.text();
                                    } catch(e) { console.error("Erreur lecture txt", e); }
                                }
                                return { url: img.download_url, type, aiAdvice: aiAdvice.trim() };
                            }));
                        };

                        const [reelles, ia, reellesRemp, iaRemp] = await Promise.all([
                            fetchFolder('im_real', 'Réelle'),
                            fetchFolder('im_ia', 'IA'),
                            fetchFolder('remplacement_im_real', 'Réelle'),
                            fetchFolder('remplacement_im_ia', 'IA')
                        ]);

                        this.images = [...reelles, ...ia].sort(() => Math.random() - 0.5);
                        this.replacementReal = reellesRemp.sort(() => Math.random() - 0.5);
                        this.replacementIA = iaRemp.sort(() => Math.random() - 0.5);
                        this.screen = 'intro';
                        this.$nextTick(() => lucide.createIcons());
                    } catch (err) {
                        this.errorMessage = err.message;
                        this.screen = 'error';
                        this.$nextTick(() => lucide.createIcons());
                    }
                },

                startTest() {
                    if (!this.userData.email || !this.userData.age) return alert("Veuillez remplir les champs obligatoires.");
                    this.screen = 'demo';
                    this.demoStep = 1;
                    this.$nextTick(() => lucide.createIcons());
                },

                startRealTest() {
                    this.screen = 'test';
                    this.currentIdx = 0;
                    this.startTimer();
                    this.$nextTick(() => lucide.createIcons());
                },

                startTimer() {
                    if (this.timer) clearInterval(this.timer);
                    this.timeLeft = 30;
                    this.startTime = Date.now();
                    this.timer = setInterval(() => {
                        this.timeLeft--;
                        if (this.timeLeft <= 0) {
                            clearInterval(this.timer);
                            this.handleRespondClick();
                        }
                    }, 1000);
                },

                handleRespondClick() {
                    if (this.timer) clearInterval(this.timer);
                    this.responseTime = (Date.now() - this.startTime) / 1000;
                    this.isResponding = true;
                    // Skip knowledge check if the image is already a replacement
                    this.isCheckingKnowledge = !this.currentImage.isReplacement;
                    this.$nextTick(() => lucide.createIcons());
                },

                handleKnowledgeResponse(known) {
                    if (known) {
                        const type = this.currentImage.type;
                        let replacement = null;
                        if (type === 'Réelle' && this.replacementReal.length > 0) {
                            replacement = this.replacementReal.pop();
                        } else if (type === 'IA' && this.replacementIA.length > 0) {
                            replacement = this.replacementIA.pop();
                        }

                        if (replacement) {
                            // Mark as replacement to skip future checks for this image
                            replacement.isReplacement = true;
                            // Force update by replacing the item in the array
                            this.images.splice(this.currentIdx, 1, replacement);
                            
                            // RESET TO PHASE 1 (Show image, Restart Timer, Show "Répondre" button)
                            this.isResponding = false;
                            this.isCheckingKnowledge = false;
                            this.startTimer();
                            this.$nextTick(() => lucide.createIcons());
                            return;
                        }
                    }
                    // If not known or no replacement available, proceed to Phase 3 (Prediction)
                    this.isCheckingKnowledge = false;
                    this.$nextTick(() => lucide.createIcons());
                },

                showAIAdvicePhase() {
                    if (!this.prediction) return alert("Veuillez choisir Réelle ou IA");
                    this.isShowingAIAdvice = true;
                    this.$nextTick(() => lucide.createIcons());
                },

                toggleReason(label) {
                    if (this.selectedReasons.includes(label)) {
                        this.selectedReasons = this.selectedReasons.filter(r => r !== label);
                    } else {
                        this.selectedReasons.push(label);
                    }
                },

                nextImage() {
                    if (!this.changeMind) return alert("Veuillez indiquer si vous changez d'avis ou non.");
                    
                    this.saveResult();
                    
                    if (this.currentIdx + 1 >= this.images.length) {
                        if (this.timer) clearInterval(this.timer);
                        this.screen = 'survey';
                    } else {
                        this.currentIdx++;
                        this.prediction = null;
                        this.changeMind = null;
                        this.selectedReasons = [];
                        this.confidence = 75;
                        this.isResponding = false;
                        this.isShowingAIAdvice = false;
                        this.responseTime = null;
                        this.startTimer();
                    }
                    this.$nextTick(() => lucide.createIcons());
                },

                saveResult() {
                    const data = {
                        date: new Date().toLocaleString('fr-FR'),
                        email: this.userData.email,
                        img_url: this.currentImage.url,
                        type: this.currentImage.type,
                        prediction: this.prediction,
                        temps_rep: this.responseTime ? this.responseTime.toFixed(2) : "30.00",
                        raison: this.selectedReasons.join(', '),
                        confiance: this.confidence,
                        aiAdvice: this.currentImage.aiAdvice,
                        changeMind: this.changeMind
                    };

                    fetch(this.SCRIPT_URL, {
                        method: "POST",
                        mode: 'no-cors',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                },

                finishTest() {
                    const finalData = {
                        ...this.userData,
                        difficulty: this.surveyData.difficulty,
                        enoughTime: this.surveyData.enoughTime
                    };

                    fetch(this.SCRIPT_URL, {
                        method: "POST",
                        mode: 'no-cors',
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(finalData)
                    });

                    this.screen = 'finish';
                    this.$nextTick(() => lucide.createIcons());
                },

                get currentImage() {
                    return this.images[this.currentIdx] || { url: '', type: '', aiAdvice: '' };
                }
            }
        }
    </script>
</body>
</html>
